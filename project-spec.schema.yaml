# project-spec.yaml 的结构化 Schema
# 用于 validate-spec.sh 校验用户填写的 project-spec.yaml 是否完整和合法

project:
  name:
    type: string
    required: true
    description: "项目名称，用于生成目录名、容器名等"
    pattern: "^[a-z][a-z0-9_-]*$"
    pattern_message: "项目名只能包含小写字母、数字、连字符和下划线，且以小写字母开头"
  type:
    type: enum
    required: true
    description: "项目类型"
    values:
      - web_app
      - api_service
      - cli_tool
      - fullstack_app
      - data_pipeline
      - ai_service
      - mobile_app
      - desktop_app
  stage:
    type: enum
    required: false
    default: mvp
    description: "项目阶段"
    values:
      - prototype
      - mvp
      - production
  owner:
    type: enum
    required: false
    default: solo_developer
    description: "团队规模"
    values:
      - solo_developer
      - small_team
      - medium_team

requirements:
  summary:
    type: string
    required: true
    min_length: 10
    description: "项目需求概述，至少 10 个字符"
  core_features:
    type: list
    required: true
    min_items: 1
    description: "核心功能列表，至少 1 项"
  optional_features:
    type: list
    required: false
    description: "可选功能列表"

constraints:
  priorities:
    type: list
    required: false
    description: "优先级排序"
  deployment:
    target:
      type: enum
      required: false
      default: vps
      values:
        - vps
        - serverless
        - container
        - local
        - cloud_managed
    containerized:
      type: boolean
      required: false
      default: true
  team_size:
    type: integer
    required: false
    default: 1
    min: 1
    max: 50

preferences:
  backend:
    preferred:
      type: enum
      required: false
      values:
        - python
        - node
        - go
        - rust
    framework:
      type: string
      required: false
  frontend:
    preferred:
      type: enum
      required: false
      values:
        - react
        - vue
        - svelte
        - none
    bundler:
      type: enum
      required: false
      values:
        - vite
        - webpack
        - next
  database:
    preferred:
      type: enum
      required: false
      values:
        - postgresql
        - mysql
        - sqlite
        - mongodb
        - none
  cache:
    preferred:
      type: enum
      required: false
      values:
        - redis
        - memcached
        - none
  python:
    version:
      type: string
      required: false
    package_manager:
      type: enum
      required: false
      values:
        - uv
        - pip
        - poetry
  node:
    version:
      type: string
      required: false
    package_manager:
      type: enum
      required: false
      values:
        - pnpm
        - npm
        - yarn
        - bun

environment:
  use_wsl:
    type: boolean
    required: false
    default: true
  use_docker_for_infra:
    type: boolean
    required: false
    default: true
  keep_host_clean:
    type: boolean
    required: false
    default: true
  project_root:
    type: string
    required: false

deliverables:
  should_generate:
    type: list
    required: false
